name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > ~/.ssh/config

      - name: Sync Files to VM
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='node_modules' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/azureuser/app/

      - name: Ensure Node.js and PM2 are Installed
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt install -y nodejs
            fi
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi
            sudo setcap 'cap_net_bind_service=+ep' \$(which node)
          "

      - name: Deploy with Zero Downtime
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /home/azureuser/app
            npm install --production
            pm2 describe faralpha-app > /dev/null 2>&1 \
              && pm2 reload faralpha-app --update-env \
              || pm2 start app.js --name faralpha-app
            pm2 save
            sudo env PATH=\$PATH:\$(which node) pm2 startup systemd -u azureuser --hp /home/azureuser
          "

      - name: Health Check
        run: |
          sleep 5
          curl --fail http://${{ secrets.SSH_HOST }}/sayHello
